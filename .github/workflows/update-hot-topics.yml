name: Update hot topics

on:
  schedule:
    - cron: "7,17,27,37,47,57 * * * *"
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/update-hot-topics.yml"
      - "scripts/update_hot_topics.py"

concurrency:
  group: update-hot-topics
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 8

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Sync external link templates
        shell: bash
        run: |
          if [[ "${GITHUB_REPOSITORY#*/}" != "hua-she-tian-zu" ]]; then
            curl --fail --silent --show-error --location \
              "https://raw.githubusercontent.com/vlo808155/hua-she-tian-zu/main/url.txt" \
              --output url.txt
          fi

      - name: Collect and render hot topics
        shell: bash
        run: |
          repository_name="${GITHUB_REPOSITORY#*/}"
          python scripts/update_hot_topics.py --repository . --repository-name "${repository_name}"

      - name: Commit and push changed pages
        run: |
          set -euo pipefail
          git config user.name "hot-topic-bot"
          git config user.email "vlo808155@users.noreply.github.com"
          git add --all
          if git diff --cached --quiet; then
            echo "No hot-topic changes"
            exit 0
          fi
          git commit -m "Update hot topics"
          git push origin HEAD:main
